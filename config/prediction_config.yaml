# Lottery Prediction System Configuration
# Phase 1 Implementation - Emergency Fixes

# ================================
# Consecutive Number Filter Settings
# ================================
consecutive_filter:
  # Enable or disable consecutive number filtering
  enabled: true
  
  # Gradual penalty system (Phase 1 improvement)
  # Instead of hard rejection,apply weighted penalties
  penalties:
    # 2 consecutive numbers (e.g., 7-8)
    two_consecutive: 0.7    # Reduce score to 70% (30% penalty)
    
    # 3 consecutive numbers (e.g., 44-45-46)
    three_consecutive: 0.4  # Reduce score to 40% (60% penalty)
    
    # 4+ consecutive numbers
    four_plus_consecutive: 0.1  # Reduce score to 10% (90% penalty)
  
  # Legacy hard penalty (for backwards compatibility, will be removed in Phase 2)
  hard_penalty_three_consecutive: 300  # Old system: add 300 penalty points
  
  # Use gradual system instead of hard penalty
  use_gradual_penalties: true

# ================================
# Strategy Weight Settings
# ================================
strategy_weights:
  # Base weights for various prediction strategies
  # Higher weight = more influence in ensemble voting
  
  # --- Core Statistical Methods ---
  frequency: 1.5
  trend: 1.5
  bayesian: 1.2
  markov: 1.0
  deviation: 1.0
  
  # --- Gap and Cold Number Analysis ---
  # Phase 1 Fix: Increased from 0.6 to 1.2
  gap_analysis: 1.2       # ⬆️ Upgraded to match mainstream methods
  gap_hunter: 1.2         # ⬆️ Upgraded to match mainstream methods  
  cold_comeback: 1.1
  
  # --- Advanced Methods ---
  lstm_attention: 0.9     # Deep learning (if available)
  ensemble_vote: 1.1
  monte_carlo: 0.8
  
  # --- Enhanced Predictors ---
  consecutive_friendly: 1.0
  multi_window_fusion: 1.1
  coverage_optimized: 0.9
  zone_balance: 1.0
  hot_cold_mix: 1.0
  
# ================================
# Dynamic Ensemble Settings
# ================================
dynamic_ensemble:
  # Market state-based strategy bias
  state_strategy_bias:
    hot_trend:
      hot_frequency: 1.5
      multi_window_fusion: 1.3
      consecutive_friendly: 1.2
    
    cold_reversal:
      cold_comeback: 1.6
      deviation_predict: 1.4
      gap_analysis: 1.3      # ⬆️ Higher influence in cold markets
    
    balanced:
      zone_balance: 1.3
      constrained: 1.3
      ensemble_vote: 1.2
    
    volatile:
      coverage_optimized: 1.4
      monte_carlo: 1.3
      enhanced_ensemble: 1.2
    
    clustered:
      consecutive_friendly: 1.5
      pattern_match: 1.3
      multi_window_fusion: 1.2

# =================================
# Experimental Settings (Phase 2+)
# =================================
# =================================
# Experimental Settings (Phase 2+)
# =================================
experimental:
  # Multi-Armed Bandit settings (Phase 2)
  mab_enabled: true
  mab_algorithm: "thompson_sampling"  # or "ucb1"
  mab_exploration_rate: 0.1
  mab_config:
    window_size: 30
    reward_scheme: 'progressive'
    temperature: 0.5
    diversity_lambda: 0.5   # Strength of overlap penalty (Phase 3)
  
  # Anomaly Detection settings (Phase 2)
  anomaly_detection_enabled: true
  anomaly_contamination: 0.1  # Assume 10% of patterns are anomalies
  anomaly_weight: 0.8
  anomaly_config:
    n_estimators: 100
    use_enhanced: true
    n_models: 3

# =================================
118: # Strategy-Specific Hyperparameters (Phase 3 Optimized)
119: # =================================
strategies:
  # --- Big Lotto (大樂透) Optimized Parameters ---
  BIG_LOTTO:
    trend:
      lambda: 0.01
    deviation:
      weights:
        frequency: 0.30
        zone: 0.25
        odd_even: 0.20
        high_low: 0.15
        gap: 0.10
    statistical:
      params:
        sum_range_mult: 0.4
        ac_min_mult: 0.15
        ac_max_mult: 0.35
        odd_tolerance: 2
        spread_mult: 0.4
        unique_last_digits_min: 4
        weight_power: 0.5
        
  # --- Power Lotto (威力彩) Optimized Parameters ---
  POWER_LOTTO:
    trend:
      lambda: 0.01  # Power Lotto also favors slow decay
    deviation:
      weights:
        frequency: 0.30
        zone: 0.25
        odd_even: 0.20
        high_low: 0.15
        gap: 0.10
    statistical:
      params:
        sum_range_mult: 0.4  # Matches tuning result
        ac_min_mult: 0.15
        ac_max_mult: 0.35
        odd_tolerance: 2
        spread_mult: 0.4
        unique_last_digits_min: 4
        weight_power: 0.5
        
  # --- Global Defaults (Fallback) ---
  trend:
    lambda: 0.05
  deviation:
    weights:
      frequency: 0.30
      zone: 0.25
      odd_even: 0.20
      high_low: 0.15
      gap: 0.10
  statistical:
    params:
      sum_range_mult: 0.6
      ac_min_mult: 0.15
      ac_max_mult: 0.35
      odd_tolerance: 3
      spread_mult: 0.4
      unique_last_digits_min: 3
      weight_power: 0.5

# =================================
# Backtest Verification Settings
# =================================
verification:
  # Overfitting score threshold
  min_overfitting_score: 70
  
  # Target match rates
  target_match3_rate_single_bet: 0.027  # 2.7%
  target_match3_rate_7bet: 0.14         # 14%
  
  # Rolling backtest settings
  default_test_periods: 50
  min_history_for_prediction: 50
