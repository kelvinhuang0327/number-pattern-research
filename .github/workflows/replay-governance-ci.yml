name: Replay Governance CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      db_path:
        description: "Optional absolute/relative path to replay DB fixture for dedicated lane"
        required: false
        default: ""

jobs:
  replay-default-validation:
    name: replay-default-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest fastapi "pydantic>=2,<3" python-multipart

      - name: Run default replay validation lane
        run: |
          python scripts/run_replay_ci_default_validation.py

  replay-dedicated-db-validation:
    name: replay-dedicated-db-validation
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      LOTTERY_REPLAY_DB_PATH: /tmp/lottery_replay_test_fixture.db
      LOTTERY_TEST_DB_PATH: /tmp/lottery_replay_test_fixture.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest fastapi "pydantic>=2,<3" python-multipart

      - name: Build synthetic replay DB fixture
        run: |
          FIXTURE_PATH="/tmp/lottery_replay_test_fixture.db"
          if [ -n "${{ github.event.inputs.db_path }}" ]; then
            FIXTURE_PATH="${{ github.event.inputs.db_path }}"
          fi
          python scripts/build_replay_test_fixture.py --output "${FIXTURE_PATH}"
          echo "LOTTERY_REPLAY_DB_PATH=${FIXTURE_PATH}" >> "${GITHUB_ENV}"
          echo "LOTTERY_TEST_DB_PATH=${FIXTURE_PATH}" >> "${GITHUB_ENV}"
          echo "fixture_path=${FIXTURE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Log dedicated DB fixture path
        run: |
          if [ -z "${LOTTERY_REPLAY_DB_PATH}" ]; then
            echo "LOTTERY_REPLAY_DB_PATH is empty; dedicated lane should fail fast."
          else
            echo "LOTTERY_REPLAY_DB_PATH=${LOTTERY_REPLAY_DB_PATH}"
          fi

      - name: Run dedicated replay DB validation lane
        run: |
          python scripts/run_replay_ci_db_validation.py --validate-fixture
